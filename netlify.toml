[build]
  publish = "public"
  command = "npm run check"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_CALENDAR_ID,GOOGLE_CLIENT_ID,GOOGLE_DRIVE_FOLDER_ID,GOOGLE_REDIRECT_URI"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/auth/google"
  to = "/.netlify/functions/api/auth/google"
  status = 200
  force = true

[[redirects]]
  from = "/oauth2callback"
  to = "/.netlify/functions/api/oauth2callback"
  status = 200
  force = true
