<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="Band Room rehearsal attendance, score viewing, and practice board.">
    <title>Band Room</title>
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <strong id="appTitle">Band Room</strong>
          <span>합주 참석, 악보, 연습 현황</span>
        </div>
        <div class="top-actions">
          <a class="connect-link" id="connectGoogle" href="/auth/google">Google 연결</a>
          <span class="status" id="statusText">시작 중</span>
        </div>
      </header>

      <nav class="tabs" aria-label="주요 메뉴">
        <button class="tab active" data-view="scheduleView">참석표</button>
        <button class="tab" data-view="scoresView">악보</button>
        <button class="tab" data-view="boardView">체크보드</button>
      </nav>

      <main>
        <section class="setup-panel" id="setupPanel" hidden></section>

        <section class="view active" id="scheduleView">
          <div class="calendar-layout">
            <section class="panel calendar-panel" aria-labelledby="monthLabel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Attendance</p>
                  <h1 id="monthLabel">월간 참석표</h1>
                </div>
                <div class="button-row">
                  <button class="button ghost" id="prevMonth">이전</button>
                  <button class="button ghost" id="todayMonth">오늘</button>
                  <button class="button ghost" id="nextMonth">다음</button>
                </div>
              </div>
              <div class="calendar-grid" id="calendarGrid"></div>
            </section>

            <aside class="panel day-panel" aria-labelledby="dayPanelTitle">
              <div class="panel-head compact">
                <div>
                  <p class="eyebrow">Attendance</p>
                  <h2 id="dayPanelTitle">참석 체크</h2>
                </div>
              </div>
              <div class="day-panel-body" id="dayPanel"></div>
            </aside>
          </div>
        </section>

        <section class="view" id="scoresView">
          <div class="score-layout">
            <aside class="panel score-list-panel" aria-labelledby="scoreListTitle">
              <div class="panel-head compact">
                <div>
                  <p class="eyebrow">Scores</p>
                  <h2 id="scoreListTitle">악보 목록</h2>
                </div>
                <button class="button ghost" id="refreshScores">새로고침</button>
              </div>
              <div class="file-list" id="fileList"></div>
            </aside>

            <section class="panel viewer-panel" aria-labelledby="viewerTitle">
              <div class="viewer-bar">
                <strong id="viewerTitle">악보를 선택하세요</strong>
                <button class="button primary" id="readerMode">악보 보기 모드</button>
              </div>
              <div class="viewer-empty" id="viewerArea">
                구글 드라이브 폴더의 PDF와 이미지 악보가 이곳에 표시됩니다.
              </div>
            </section>
          </div>
        </section>

        <section class="view" id="boardView">
          <div class="board-layout">
            <section class="panel" aria-labelledby="songTitle">
              <div class="panel-head compact">
                <div>
                  <p class="eyebrow">Progress</p>
                  <h2 id="songTitle">곡 진척도</h2>
                </div>
              </div>
              <div class="card-list" id="songList"></div>
              <form class="inline-form" id="songForm">
                <label>
                  <span>새 곡</span>
                  <input id="newSongTitle" name="title" placeholder="곡 제목">
                </label>
                <button class="button primary" type="submit">곡 추가</button>
              </form>
            </section>

            <section class="panel" aria-labelledby="noticeTitle">
              <div class="panel-head compact">
                <div>
                  <p class="eyebrow">Notes</p>
                  <h2 id="noticeTitle">공지 및 준비</h2>
                </div>
              </div>
              <div class="card-list" id="noticeList"></div>
              <form class="inline-form" id="noticeForm">
                <label>
                  <span>새 항목</span>
                  <input id="newNoticeText" name="text" placeholder="공지 또는 준비물">
                </label>
                <button class="button primary" type="submit">항목 추가</button>
              </form>
            </section>
          </div>
        </section>
      </main>
    </div>

    <dialog class="access-dialog" id="accessDialog">
      <form method="dialog" id="accessForm">
        <p class="eyebrow">Band Room</p>
        <h2>입장 코드</h2>
        <p>밴드 구성원에게 공유된 코드를 입력하세요.</p>
        <label>
          <span>코드</span>
          <input id="accessCode" autocomplete="current-password" autofocus>
        </label>
        <button class="button primary" type="submit">입장</button>
      </form>
    </dialog>
  </body>
</html>
