services:
  - type: web
    name: band-room-webapp
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: PORT
        value: 10000
      - key: BAND_ACCESS_CODE
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false

